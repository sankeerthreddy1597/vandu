// ─── ICON SET ─────────────────────────────────────────────────────────────────

  const paths = {
    home: <><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" /><path d="M9 21V12h6v9" /></>,
    book: <><path d="M4 19.5A2.5 2.5 0 016.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" /></>,

    star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
    grid: <><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></>,
    list: <><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></>,

    sparkle: <><path d="M12 3v1m0 16v1M4.22 4.22l.7.7m12.16 12.16.7.7M3 12h1m16 0h1M4.22 19.78l.7-.7M18.36 5.64l.7-.7" /><circle cx="12" cy="12" r="3" /></>,

// ─── FOOD EMOJI PLACEHOLDER ────────────────────────────────────────────────
const FoodEmoji = ({ emoji, bg, size = 56 }) => (
  <div style={{ width: size, height: size, borderRadius: 14, background: bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.5, flexShrink: 0 }}>
    {emoji}
  </div>
);

// ─── BOTTOM NAV ────────────────────────────────────────────────────────────
const BottomNav = ({ active, onNav, t }) => {
  const tabs = [
    { id: "home", label: "Home", icon: "home" },
    { id: "recipes", label: "Recipes", icon: "book" },
    { id: "add", label: "Add", icon: "plus" },
    { id: "profile", label: "Profile", icon: "user" },
  ];
  return (
    <div style={{ display: "flex", borderTop: `1px solid oklch(90% 0.01 80)`, background: t.cream, paddingBottom: 8 }}>
      {tabs.map(tab => {
        const isActive = active === tab.id;
        return (
          <button key={tab.id} onClick={() => onNav(tab.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 0 2px", background: "none", border: "none", cursor: "pointer", color: isActive ? t.activeNav : "oklch(60% 0.01 80)" }}>
            <Icon name={tab.icon} size={22} color={isActive ? t.activeNav : "oklch(60% 0.01 80)"} strokeWidth={isActive ? 2 : 1.5} />
            <span style={{ fontSize: 10, fontWeight: isActive ? 600 : 400, letterSpacing: 0.2 }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
};

// ─── SOURCE BADGE ──────────────────────────────────────────────────────────
const SourceBadge = ({ type, t, dark = false }) => {
  const labels = { instagram: "INSTA", url: "URL", photo: "PHOTO", image: "IMAGE" };
  const icons = { instagram: "instagram", url: "link", photo: "camera", image: "image" };
  const bg = dark ? "rgba(0,0,0,0.35)" : t.tag;
  const color = dark ? "#fff" : t.tagText;
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 4, background: bg, borderRadius: 20, padding: "3px 8px" }}>
      <Icon name={icons[type] || "link"} size={10} color={color} strokeWidth={2} />
      <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 0.8, color }}>{labels[type] || type.toUpperCase()}</span>
    </div>
  );
};

// ─── SCREEN: HOME ──────────────────────────────────────────────────────────
const HomeScreen = ({ onNav, t, showStats }) => (
  <div style={{ display: "flex", flexDirection: "column", height: "100%", background: t.cream, overflow: "hidden" }}>
    {/* Dark header */}
    <div style={{ background: t.dark, padding: "54px 20px 28px", borderBottomLeftRadius: 28, borderBottomRightRadius: 28 }}>
      <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 12, marginBottom: 6, letterSpacing: 0.3 }}>Good morning, Sarah ✦</p>
      <h1 className="serif" style={{ color: "#fff", fontSize: 28, lineHeight: 1.15, marginBottom: showStats ? 18 : 0 }}>
        What are you<br /><span className="serif-italic" style={{ color: t.accentLight }}>cooking today?</span>
      </h1>
      {showStats && (
        <div style={{ display: "flex", gap: 0, marginBottom: 16 }}>
          {[["24", "RECIPES"], ["8", "THIS MONTH"], ["3", "FAVORITES"]].map(([n, l], i) => (
            <div key={i} style={{ flex: 1, borderRight: i < 2 ? "1px solid rgba(255,255,255,0.12)" : "none", paddingRight: 12, paddingLeft: i > 0 ? 12 : 0 }}>
              <div style={{ color: "#fff", fontSize: 22, fontWeight: 600, fontFamily: "DM Serif Display" }}>{n}</div>
              <div style={{ color: "rgba(255,255,255,0.45)", fontSize: 9, letterSpacing: 0.8, marginTop: 1 }}>{l}</div>
            </div>
          ))}
        </div>
      )}
      {/* Search */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,0.10)", borderRadius: 12, padding: "10px 14px" }}>
        <Icon name="search" size={15} color="rgba(255,255,255,0.45)" />
        <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Search your recipes...</span>
      </div>
    </div>

    {/* Recent saves */}
    <div style={{ flex: 1, overflowY: "auto", padding: "18px 20px 8px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontWeight: 600, fontSize: 16, color: "oklch(20% 0.02 80)" }}>Recent saves</span>
        <button onClick={() => onNav("recipes")} style={{ background: "none", border: "none", cursor: "pointer", color: t.cta, fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 3 }}>
          See all <Icon name="arrow_right" size={12} color={t.cta} />
        </button>
      </div>

      {/* Featured dark card */}
      <div style={{ background: t.cardDark, borderRadius: 18, padding: 16, marginBottom: 12, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", right: 16, top: 14 }}><SourceBadge type="instagram" t={t} dark /></div>
        <div style={{ color: "rgba(255,255,255,0.45)", fontSize: 10, letterSpacing: 0.6, marginBottom: 6, marginTop: 4 }}>— FROM INSTAGRAM</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
          <div>
            <h3 className="serif-italic" style={{ color: "#fff", fontSize: 20, lineHeight: 1.2, marginBottom: 8 }}>Cacio e Pepe<br />with Truffle</h3>
            <div style={{ display: "flex", gap: 10, color: "rgba(255,255,255,0.5)", fontSize: 11 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Icon name="clock" size={11} color="rgba(255,255,255,0.5)" /> 25 min</span>
              <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Icon name="users" size={11} color="rgba(255,255,255,0.5)" /> 2 servings</span>
              <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Icon name="zap" size={11} color="rgba(255,255,255,0.5)" /> 8 ingredients</span>
            </div>
          </div>
          <div style={{ fontSize: 40 }}>🍝</div>
        </div>
      </div>

      {/* Light card */}
      <div onClick={() => onNav("recipe")} style={{ background: "#fff", borderRadius: 18, padding: 14, display: "flex", alignItems: "center", gap: 12, boxShadow: "0 1px 6px rgba(0,0,0,0.06)", cursor: "pointer" }}>
        <FoodEmoji emoji="🥗" bg={t.accentLight} size={52} />
        <div style={{ flex: 1 }}>
          <div style={{ marginBottom: 4 }}><SourceBadge type="url" t={t} /></div>
          <div style={{ fontWeight: 600, fontSize: 15, color: "oklch(18% 0.02 80)", marginBottom: 4 }}>Roasted Beet &amp; Feta Salad</div>
          <div style={{ display: "flex", gap: 10, color: "oklch(55% 0.01 80)", fontSize: 11 }}>
            <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Icon name="clock" size={11} color="oklch(55% 0.01 80)" /> 40 min</span>
            <span style={{ display: "flex", alignItems: "center", gap: 3 }}><Icon name="users" size={11} color="oklch(55% 0.01 80)" /> 4 servings</span>
          </div>
        </div>
      </div>

      {/* Image card */}
      <div style={{ marginTop: 10, background: t.cardBg, borderRadius: 18, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 52, height: 52, borderRadius: 12, background: "oklch(82% 0.04 50)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>🫐</div>
        <div>
          <div style={{ marginBottom: 4 }}><SourceBadge type="image" t={t} /></div>
          <div style={{ fontWeight: 600, fontSize: 14, color: "oklch(18% 0.02 80)" }}>Blueberry Clafoutis</div>
          <div style={{ color: "oklch(55% 0.01 80)", fontSize: 11, marginTop: 3 }}>⏱ 55 min · 6 servings</div>
        </div>
      </div>
    </div>

    {/* FAB */}
    <div style={{ padding: "0 20px 8px", position: "relative" }}>
      <button onClick={() => onNav("add")} style={{ position: "absolute", right: 24, bottom: 10, width: 48, height: 48, borderRadius: "50%", background: t.cta, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 4px 16px ${t.cta}55` }}>
        <Icon name="plus" size={22} color="#fff" strokeWidth={2.5} />

// ─── SCREEN: RECIPE DETAIL ─────────────────────────────────────────────────
const RecipeScreen = ({ onNav, t }) => {
  const [checkedItems, setCheckedItems] = useState([]);
  const ingredients = [
    ["Spaghetti", "200g"], ["Pecorino Romano, grated", "80g"], ["Parmigiano-Reggiano", "40g"],
    ["Black pepper, coarsely ground", "2 tsp"], ["Black truffle, shaved", "15g"], ["Salt", "to taste"],
  ];
  const toggle = (i) => setCheckedItems(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]);
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: t.cream, overflow: "hidden" }}>
      {/* Hero */}
      <div style={{ background: t.dark, position: "relative", paddingBottom: 32, borderBottomLeftRadius: 28, borderBottomRightRadius: 28, flexShrink: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", padding: "54px 18px 0" }}>
          <button onClick={() => onNav("home")} style={{ width: 34, height: 34, borderRadius: "50%", background: "rgba(255,255,255,0.12)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="arrow_left" size={16} color="#fff" />
          </button>
          <button style={{ width: 34, height: 34, borderRadius: "50%", background: "rgba(255,255,255,0.12)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name="heart" size={16} color="#fff" />
          </button>
        </div>
        <div style={{ textAlign: "center", fontSize: 64, marginTop: 4, marginBottom: 6 }}>🍝</div>
        <div style={{ padding: "0 20px" }}>
          <div style={{ marginBottom: 8 }}><SourceBadge type="instagram" t={t} dark /></div>
          <h2 className="serif" style={{ color: "#fff", fontSize: 26, lineHeight: 1.2 }}>Cacio e Pepe<br /><span className="serif-italic" style={{ color: t.accentLight }}>with Black Truffle</span></h2>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 16px" }}>
        {/* Stats row */}
        <div style={{ display: "flex", background: "#fff", borderRadius: 16, margin: "16px 0 20px", boxShadow: "0 2px 8px rgba(0,0,0,0.07)" }}>
          {[["25", "MINUTES"], ["2", "SERVINGS"], ["8", "INGREDIENTS"], ["4.8", "RATING"]].map(([val, label], i) => (
            <div key={i} style={{ flex: 1, textAlign: "center", padding: "12px 0", borderRight: i < 3 ? `1px solid oklch(92% 0.01 80)` : "none" }}>
              <div style={{ fontFamily: "DM Serif Display", fontSize: 18, color: "oklch(18% 0.02 80)" }}>
                {label === "RATING" ? <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 2 }}><svg width="13" height="13" viewBox="0 0 24 24" fill={t.cta}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg><span>{val}</span></span> : val}
              </div>
              <div style={{ fontSize: 8, letterSpacing: 0.8, color: "oklch(60% 0.01 80)", marginTop: 2 }}>{label}</div>
            </div>
          ))}
        </div>

        <h3 style={{ fontWeight: 600, fontSize: 17, marginBottom: 12, color: "oklch(15% 0.02 80)" }}>Ingredients</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
          {ingredients.map(([name, amount], i) => {
            const checked = checkedItems.includes(i);
            return (
              <div key={i} onClick={() => toggle(i)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 0", borderBottom: "1px solid oklch(92% 0.01 80)", cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", border: `2px solid ${checked ? t.cta : "oklch(80% 0.01 80)"}`, background: checked ? t.cta : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {checked && <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2,5 4.5,7.5 8,3" stroke="#fff" strokeWidth="2" strokeLinecap="round" /></svg>}
                  </div>
                  <span style={{ fontSize: 14, color: checked ? "oklch(65% 0.01 80)" : "oklch(20% 0.02 80)", textDecoration: checked ? "line-through" : "none" }}>{name}</span>
                </div>
                <span style={{ fontSize: 13, color: "oklch(55% 0.01 80)", fontWeight: 500 }}>{amount}</span>
              </div>
            );
          })}
        </div>

        <h3 style={{ fontWeight: 600, fontSize: 17, marginTop: 24, marginBottom: 12, color: "oklch(15% 0.02 80)" }}>Steps</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 14, paddingBottom: 16 }}>
          {[
            "Bring a large pot of salted water to a boil. Cook spaghetti until al dente, reserving 1 cup of pasta water before draining.",
            "Toast black pepper in a dry pan over medium heat for 1–2 minutes until fragrant. Remove and set aside.",
            "Combine Pecorino Romano and Parmigiano-Reggiano in a bowl. Add a splash of cold water and mix into a thick paste.",
            "Add drained pasta to the pan off-heat. Toss with cheese paste, adding pasta water gradually until silky and creamy.",
            "Plate immediately and finish with shaved black truffle and an extra crack of pepper.",
          ].map((step, i) => (
            <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 26, height: 26, borderRadius: "50%", background: t.accentLight, color: t.cta, fontWeight: 700, fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                {i + 1}
              </div>
              <p style={{ fontSize: 14, color: "oklch(25% 0.02 80)", lineHeight: 1.55, flex: 1, margin: 0 }}>{step}</p>
            </div>
          ))}
        </div>
      </div>

      <BottomNav active="recipes" onNav={onNav} t={t} />
    </div>
  );
};

  const [urlText, setUrlText] = useState("https://www.seriouseats.com/...");

};

// ─── SCREEN: RECIPES GRID ──────────────────────────────────────────────────

  const recipes = [
    { id: 1, name: "Cacio e Pepe with Black Truffle", emoji: "🍝", bg: "oklch(78% 0.06 70)", type: "instagram", time: "25m", servings: 2, favorited: false },
    { id: 2, name: "Roasted Beet & Feta", emoji: "🥗", bg: "oklch(80% 0.08 140)", type: "url", time: "40m", servings: 4, favorited: false },
    { id: 3, name: "Miso Short Ribs", emoji: "🍲", bg: "oklch(75% 0.07 35)", type: "photo", time: "3h", servings: 6, favorited: false },

              <Icon name="grid" size={15} color={recipeView === "grid" ? "#fff" : "oklch(50% 0.01 80)"} strokeWidth={1.8} />
            </button>
            <button onClick={() => setRecipeView("list")} style={{ width: 32, height: 32, borderRadius: 9, background: recipeView === "list" ? t.cta : "oklch(92% 0.01 80)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="list" size={15} color={recipeView === "list" ? "#fff" : "oklch(50% 0.01 80)"} strokeWidth={1.8} />
            </button>
          </div>
        </div>

        {/* Search */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", borderRadius: 12, padding: "10px 14px", marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <Icon name="search" size={15} color="oklch(65% 0.01 80)" />

        </div>

        {/* Filters */}
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 12, scrollbarWidth: "none" }}>
          {filters.map(f => (
            <button key={f} onClick={() => setActiveFilter(f)} style={{ flexShrink: 0, background: activeFilter === f ? t.pill : "transparent", color: activeFilter === f ? "#fff" : "oklch(40% 0.01 80)", border: activeFilter === f ? "none" : "1.5px solid oklch(82% 0.01 80)", borderRadius: 20, padding: "6px 14px", fontSize: 13, fontWeight: activeFilter === f ? 600 : 400, cursor: "pointer", fontFamily: "DM Sans", transition: "all 0.15s" }}>

      <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 12px" }}>

              <div style={{ background: recipes[0].bg, height: 170, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", fontSize: 52 }}>

                <div style={{ position: "absolute", top: 10, left: 10 }}><SourceBadge type={recipes[0].type} t={t} /></div>

                  <div key={r.id} onClick={() => onNav("recipe")} style={{ background: "#fff", borderRadius: 16, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12, boxShadow: "0 1px 5px rgba(0,0,0,0.05)", cursor: "pointer" }}>
                    <div style={{ width: 48, height: 48, borderRadius: 13, background: r.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>{r.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 0.8, color: t.cta, marginBottom: 3 }}>{r.type.toUpperCase()}</div>
                      <div style={{ fontWeight: 600, fontSize: 14, color: "oklch(15% 0.02 80)", marginBottom: 4 }}>{r.name.length > 22 ? r.name.slice(0, 22) + "..." : r.name}</div>

                        <span style={{ fontSize: 11, color: "oklch(55% 0.01 80)" }}>⏱ {r.time}</span>
                        {r.servings && <span style={{ fontSize: 11, color: "oklch(55% 0.01 80)" }}>👥 {r.servings}</span>}
                        <span style={{ background: t.tag, color: t.tagText, fontSize: 10, padding: "2px 8px", borderRadius: 10, fontWeight: 500 }}>

      <BottomNav active="recipes" onNav={onNav} t={t} />

// ─── MAIN APP ──────────────────────────────────────────────────────────────
function App() {

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.theme] || THEMES.forest;

  const [nav, setNav] = useState("home");
  const [recipeView, setRecipeView] = useState(tweaks.recipeView || "grid");

  const handleNav = (screen) => {
    if (screen === "recipes" || screen === "recipe") {
      setNav(screen);
    } else {
      setNav(screen);
    }
  };

  const screens = {
    home:    <HomeScreen onNav={handleNav} t={t} showStats={tweaks.showStats} />,
    recipe:  <RecipeScreen onNav={handleNav} t={t} />,
    add:     <AddScreen onNav={handleNav} t={t} />,
    recipes: <RecipesGrid onNav={handleNav} t={t} recipeView={recipeView} setRecipeView={(v) => { setRecipeView(v); setTweak("recipeView", v); }} />,
    profile: <HomeScreen onNav={handleNav} t={t} showStats={tweaks.showStats} />,
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px", gap: 0 }}>
      <IOSDevice width={393} height={852} dark={nav === "recipe"}>
        <div style={{ width: "100%", height: "100%", background: t.cream, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          {screens[nav] || screens.home}
        </div>
      </IOSDevice>

      <TweaksPanel>
        <TweakSection label="Color Theme">
          <TweakRadio
            id="theme"
            value={tweaks.theme}
            options={[
              { value: "forest", label: "Forest" },
              { value: "slate",  label: "Slate" },
              { value: "plum",   label: "Plum" },
            ]}
            onChange={v => setTweak("theme", v)}
          />
        </TweakSection>
        <TweakSection label="Home Stats">
          <TweakRadio
            id="showStats"
            value={tweaks.showStats ? "on" : "off"}
            options={[{ value: "on", label: "Show" }, { value: "off", label: "Hide" }]}
            onChange={v => setTweak("showStats", v === "on")}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
